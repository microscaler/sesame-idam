# Nextest configuration for Sesame-IDAM
# See https://nexte.st/book/config-file.html for documentation

# Serialize all `tests/db_integration_suite.rs` tests: they share one `TEST_DATABASE_URL` and fixed
# table names (`test_users`, hook tables, etc.). Parallel test *processes* against the same DB race
# on INSERT/DELETE counts — the source of "flaky" active_model_crud failures. See docs/TEST_INFRASTRUCTURE.md.
# (CI still runs this binary in a separate `db-serial` step for clarity; the mutex makes
# `cargo nextest run --workspace --profile default` safe too.)
[test-groups]
lifeguard-shared-postgres = { max-threads = 1 }

[profile.default]
# Retry flaky tests up to 3 times
retries = 3

# Test output style
# Use all available cores
test-threads = "num-cpus"

# Timeout configuration
slow-timeout = { period = "60s" }
leak-timeout = { period = "5s" }

# Test output - show summary only, no detailed stdout for successful tests
failure-output = "immediate-final"  # Show output immediately on failure
success-output = "never"  # Don't show stdout for successful tests
status-level = "all"  # Show all test statuses

# JUnit XML output for CI
junit = { path = "test-results.xml" }

[[profile.default.overrides]]
filter = 'binary(db_integration_suite)'
test-group = 'lifeguard-shared-postgres'
slow-timeout = { period = "180s" }

# Handler-level BDD suites below also use the shared Postgres instance. Keeping
# them in the same mutex group prevents transient pool exhaustion under the
# workspace-wide, process-per-test run.
[[profile.default.overrides]]
filter = 'test(/bdd::(api_key_flow|principal_effective_db|account_first_onboarding|auth_flow|authz_enrichment|signup_validate|token_lifecycle|users_me_db|user_admin_flow|org_lifecycle)::/)'
test-group = 'lifeguard-shared-postgres'
slow-timeout = { period = "180s" }

# Override slow timeout for integration tests
[profile.ci]
retries = 3
test-threads = "num-cpus"
slow-timeout = { period = "300s" }  # 5 minutes for integration tests
leak-timeout = { period = "5s" }
failure-output = "immediate-final"  # Show output immediately on failure
success-output = "never"  # Don't show stdout for successful tests
status-level = "all"  # Show all test statuses
junit = { path = "test-results.xml" }

[[profile.ci.overrides]]
filter = 'binary(db_integration_suite)'
test-group = 'lifeguard-shared-postgres'
slow-timeout = { period = "300s" }

[[profile.ci.overrides]]
filter = 'test(/bdd::(api_key_flow|principal_effective_db|account_first_onboarding|auth_flow|authz_enrichment|signup_validate|token_lifecycle|users_me_db|user_admin_flow|org_lifecycle)::/)'
test-group = 'lifeguard-shared-postgres'
slow-timeout = { period = "300s" }

# Single-threaded DB integration: avoids DDL races and connection exhaustion on a shared Postgres
# (e.g. `just dev-up` + `TEST_DATABASE_URL`). See docs/TEST_INFRASTRUCTURE.md.
[profile.db-serial]
retries = 2
test-threads = 1
slow-timeout = { period = "300s" }
leak-timeout = { period = "5s" }
failure-output = "immediate-final"
success-output = "never"
status-level = "all"
junit = { path = "test-results.xml" }

# Development profile with verbose output
[profile.dev]
retries = 3
test-threads = "num-cpus"
slow-timeout = { period = "60s" }
leak-timeout = { period = "5s" }
failure-output = "immediate-final"  # Show output immediately on failure
success-output = "never"  # Don't show stdout for successful tests
status-level = "all"  # Show all test statuses

[[profile.dev.overrides]]
filter = 'binary(db_integration_suite)'
test-group = 'lifeguard-shared-postgres'
slow-timeout = { period = "180s" }

[[profile.dev.overrides]]
filter = 'test(/bdd::(api_key_flow|principal_effective_db|account_first_onboarding|auth_flow|authz_enrichment|signup_validate|token_lifecycle|users_me_db|user_admin_flow|org_lifecycle)::/)'
test-group = 'lifeguard-shared-postgres'
slow-timeout = { period = "180s" }
