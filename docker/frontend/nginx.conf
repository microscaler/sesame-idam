# Sesame frontend static server (ADR-010).
#
# SPA fallback + a /idam proxy so the browser talks to ONE origin per app:
# the hosted auth surface and the consoles call the identity services
# same-origin, which keeps the Gate A5 CORS allow-list small and makes the
# ADR-008 passkey story (one origin) hold at the edge too.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Liveness/readiness — cheap, no SPA fallback.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Identity API, same-origin.
  location /idam/ {
    proxy_pass http://identity-login-service.sesame-idam.svc.cluster.local:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Hashed assets are immutable.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA routes (/authorize, /verify-magic, console deep links).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
    # Hardening: the auth surface must not be framed by third parties
    # (clickjacking on the credential ceremony). Consoles inherit the same.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  }
}
