# Local SAML/OAuth pact broker — SSOReady-compatible mocks for desktop dev.
# Cluster DNS: sesame-idam-broker.sesame-idam.svc.cluster.local:9190
# Host access: Tilt port-forward 9190:9190
apiVersion: v1
kind: Service
metadata:
  name: sesame-idam-broker
  namespace: sesame-idam
  labels:
    app: sesame-idam-broker
spec:
  type: ClusterIP
  selector:
    app: sesame-idam-broker
  ports:
  - name: http
    port: 9190
    targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sesame-idam-broker
  namespace: sesame-idam
  labels:
    app: sesame-idam-broker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sesame-idam-broker
  template:
    metadata:
      labels:
        app: sesame-idam-broker
    spec:
      containers:
      - name: broker
        image: localhost:5001/sesame-idam-broker:tilt
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 9190
        env:
        - name: SESAME_BROKER_PORT
          value: "9190"
        - name: SESAME_BROKER_BASE_URL
          value: "http://sesame-idam-broker.sesame-idam.svc.cluster.local:9190"
        - name: SESAME_BROKER_APP_REDIRECT_URL
          value: "http://loadlinker.dev.microscaler.local/saml/callback"
        - name: SESAME_BROKER_API_KEY
          value: "ssoready_sk_test"
        - name: RUST_LOG
          value: "info"
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 2
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 30
