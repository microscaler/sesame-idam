# PersistentVolumes for Sesame-IDAM (Redis only).
# Postgres/parquet PVs are provided by microscaler-supabase (just supabase-apply).
# Kind node: sesame-idam-control-plane. Requires kind-config extraMounts: /tmp/sesame-idam-data -> /mnt/sesame-idam-data

apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-pv
  labels:
    app: redis
spec:
  storageClassName: manual
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/sesame-idam-data/redis
    type: DirectoryOrCreate
