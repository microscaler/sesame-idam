# PersistentVolumes for monitoring (Prometheus, Grafana) — optional, same pattern as RERP
# Apply when adding Prometheus/Grafana. Create dirs on host or use emptyDir in deployments.

apiVersion: v1
kind: PersistentVolume
metadata:
  name: prometheus-pv
  labels:
    app: prometheus
spec:
  storageClassName: manual
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/sesame-idam-data/prometheus
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: grafana-pv
  labels:
    app: grafana
spec:
  storageClassName: manual
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /mnt/sesame-idam-data/grafana
    type: DirectoryOrCreate
