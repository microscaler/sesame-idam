# Shared Helm overlay for all Sesame-IDAM microservices (Flux valuesFrom).
deployment:
  replicas: 1
  namespace: sesame-idam

image:
  repository: 10.177.76.220:5000
  pullPolicy: IfNotPresent

serviceType: ClusterIP

service:
  port: 8080
  containerPort: 8080
  nodePort: null

app:
  config:
    # Rendered by helm templates/configmap.yaml as /app/config/config.yaml
    # (same toYaml pattern as rerp-microservice).
    security:
      api_keys:
        ApiKeyHeader:
          key: ""
      jwks:
        # Must match OpenAPI components.securitySchemes name exactly (BearerAuth).
        # BRRTRouter registers JWKS providers by that key; camelCase twins hide drift.
        BearerAuth:
          jwks_url: http://identity-session-service.sesame-idam.svc.cluster.local:8080/idam/v1/.well-known/jwks.json
          iss: https://idam.example.com
          aud: sesame-idam
          leeway_secs: 30
          cache_ttl_secs: 300
    http:
      keep_alive: true
      timeout_secs: 5
      max_requests: 50000
    database:
      host: postgres.data.svc.cluster.local
      port: 5432
      name: sesame_idam
      user: sesame_idam
      # Password comes from Secret sesame-idam-db-credentials (DB_PASS env).
      password: ""
      # Keep at 2 cluster-wide. Bumping every Sesame service to 8 exhausted
      # pgpool front-end slots (num_init_children) with "too many clients".
      # Prefer raising postgres-ha pgpool children (shared-gitops) over app pools.
      # Login exclusive-txn wedges: restart the pod; do not raise this default.
      max_connections: 2
    redis:
      host: redis.data.svc.cluster.local
      port: 6379
      db: 0
      max_connections: 5
    observability:
      otlp_endpoint: "http://otel-collector.observability.svc.cluster.local:4317"

env:
  RUST_LOG: debug
  RUST_BACKTRACE: "1"
  BRRTR_LOG_FORMAT: json
  BRRTR_STACK_SIZE: "0x40000"

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
