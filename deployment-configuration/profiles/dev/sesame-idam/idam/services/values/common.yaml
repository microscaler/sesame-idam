# Shared Helm overlay for all Sesame-IDAM microservices (Flux valuesFrom).
deployment:
  replicas: 1
  namespace: sesame-idam

image:
  repository: 10.177.76.220:5000
  pullPolicy: IfNotPresent

serviceType: ClusterIP

service:
  port: 8080
  containerPort: 8080
  nodePort: null

app:
  config:
    http:
      keep_alive: true
      timeout_secs: 5
      max_requests: 50000
    database:
      host: postgres.data.svc.cluster.local
      port: 5432
      name: sesame_idam
      user: sesame_idam
      # Password comes from Secret sesame-idam-db-credentials (DB_PASS).
      password: ""
      max_connections: 10
    redis:
      host: redis.data.svc.cluster.local
      port: 6379
      db: 0
      max_connections: 10

env:
  RUST_LOG: debug
  RUST_BACKTRACE: "1"
  BRRTR_LOG_FORMAT: json
  BRRTR_STACK_SIZE: "0x40000"

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
