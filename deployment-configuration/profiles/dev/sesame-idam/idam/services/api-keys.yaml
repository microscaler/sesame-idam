apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: api-keys
spec:
  interval: 5m
  timeout: 5m
  releaseName: api-keys
  targetNamespace: sesame-idam
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: ./helm/sesame-idam-microservice
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: product-sesame-idam
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: sesame-idam-idam-common-helm-values
      valuesKey: values.yaml
  values:
    service:
      name: api-keys
    image:
      name: sesame-idam-api-keys
      tag: dev-1784457462838640124 # {"$imagepolicy": "flux-system:sesame-idam-api-keys:tag"}
    app:
      binaryName: api-keys
      serviceName: api-keys
