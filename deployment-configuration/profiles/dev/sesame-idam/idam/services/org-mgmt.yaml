apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: org-mgmt
spec:
  interval: 5m
  timeout: 5m
  releaseName: org-mgmt
  targetNamespace: sesame-idam
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  chart:
    spec:
      chart: ./helm/sesame-idam-microservice
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: product-sesame-idam
        namespace: flux-system
      interval: 1m
  valuesFrom:
    - kind: ConfigMap
      name: sesame-idam-idam-common-helm-values
      valuesKey: values.yaml
  values:
    service:
      name: org-mgmt
    image:
      name: sesame-idam-org-mgmt
      tag: dev-1784456069530363400 # {"$imagepolicy": "flux-system:sesame-idam-org-mgmt:tag"}
    app:
      binaryName: org-mgmt
      serviceName: org-mgmt
