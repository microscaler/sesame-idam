apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Bootstrap runs beside the platform-owned PostgreSQL administrator Secret.
namespace: data

resources:
  - database-job.yaml

configMapGenerator:
  - name: sesame-idam-bootstrap-config
    envs:
      - application.properties

secretGenerator:
  - name: sesame-idam-bootstrap-db
    envs:
      - application.secrets.env

generatorOptions:
  disableNameSuffixHash: true
  immutable: false
