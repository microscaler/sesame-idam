apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: sesame-idam

resources:
  # ADR-006 step 1: shared Ed25519 signing KEYSET (sesame-idam-signing-keyset).
  # SOPS-encrypted Secret manifest (only stringData is encrypted per
  # .sops.yaml's *.secret.yaml rule); Flux kustomize-controller decrypts on
  # reconcile. All identity-session replicas + identity-login load this same
  # keyset (helm signingKeyset.enabled) — deterministic RFC 7638 kids,
  # rotation by editing the keyset (just keyset-secret N <this path>).
  # Supersedes the env-pair Secret below for images carrying the keyset code;
  # the env pair stays as the fallback for older images.
  - signing-keyset.secret.yaml

configMapGenerator:
  - name: sesame-idam-database-config
    envs:
      - application.properties

secretGenerator:
  - name: sesame-idam-db-credentials
    envs:
      - application.secrets.env
  # Shared Ed25519 signing key: identity-login-service signs; identity-session-service
  # publishes the public half in JWKS. Without this, login uses kid=dev-ephemeral and
  # session generates a fresh key-* kid on each restart — BFF JWKS validation fails.
  - name: sesame-idam-jwt-signing
    envs:
      - jwt-signing.secrets.env

generatorOptions:
  disableNameSuffixHash: true
  immutable: false
