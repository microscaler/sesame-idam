components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token (from Identity Service)
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
    CreateOrgRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Organisation name
        slug:
          type: string
          description: Organisation slug (URL-safe identifier)
        logo_url:
          type: string
          format: uri
          description: Organisation logo URL
        domain:
          type: string
          description: Primary organisation domain
        domains:
          type: array
          items:
            type: string
          description: Additional domains for auto-join
        domain_auto_join:
          type: boolean
          default: false
          description: Enable domain-based auto-join for members
        domain_restrict:
          type: boolean
          default: false
          description: Restrict signups to the organisation's domain(s) only
        password_rotation_enabled:
          type: boolean
          default: false
          description: Enforce password rotation for all org users
        password_rotation_history_size:
          type: integer
          default: 5
          minimum: 1
          maximum: 24
          description: Number of past passwords to remember (to prevent reuse)
        password_rotation_period:
          type: integer
          default: 2592000
          minimum: 3600
          description: Password expiry period in seconds (default 30 days)
        max_users:
          type: integer
          minimum: 1
          nullable: true
          description: Maximum number of users allowed in the organisation (seat limit). null means unlimited.
        legacy_org_id:
          type: string
          nullable: true
          description: Legacy organisation ID from a previous auth system
        metadata:
          type: object
          additionalProperties: true
          description: Free-form organisation metadata
    Org:
      type: object
      required:
      - id
      - name
      - slug
      - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Organisation ID
        name:
          type: string
          description: Organisation name
        slug:
          type: string
          description: Organisation slug
        logo_url:
          type: string
          format: uri
          description: Organisation logo URL
        domain:
          type: string
          nullable: true
          description: Primary organisation domain
        domains:
          type: array
          items:
            type: string
          nullable: true
          description: Additional domains for auto-join
        domain_auto_join:
          type: boolean
          default: false
          description: Whether domain-based auto-join is enabled for members
        domain_restrict:
          type: boolean
          default: false
          description: Whether signups are restricted to the organisation's domain(s) only
        password_rotation_enabled:
          type: boolean
          default: false
          description: Whether password rotation is enforced for all org users
        password_rotation_history_size:
          type: integer
          default: 5
          description: Number of past passwords remembered to prevent reuse
        password_rotation_period:
          type: integer
          default: 2592000
          description: Password expiry period in seconds (default 30 days)
        max_users:
          type: integer
          nullable: true
          description: Maximum number of users allowed (seat limit). null means unlimited.
        legacy_org_id:
          type: string
          nullable: true
          description: Legacy organisation ID from a previous auth system
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form organisation metadata
        is_saml_configured:
          type: boolean
          default: false
          description: Whether SAML SSO is configured for this org
        is_saml_in_test_mode:
          type: boolean
          default: false
          description: Whether SAML is in test mode
        can_setup_saml:
          type: boolean
          default: true
          description: Whether the org can configure SAML SSO
        isolated:
          type: boolean
          default: false
          description: Whether the org uses isolated SAML (separate identity pool)
        sso_trust_level:
          type: string
          nullable: true
          description: SAML trust level — AlwaysTrust, NeverTrust, TrustForDomain
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateOrgRequest:
      type: object
      description: Partial update for organisation settings. All fields are optional.
      properties:
        name:
          type: string
          nullable: true
          description: Organisation name
        slug:
          type: string
          nullable: true
          description: Organisation slug (URL-safe identifier)
        logo_url:
          type: string
          format: uri
          nullable: true
          description: Organisation logo URL
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form organisation metadata
        domain:
          type: string
          nullable: true
          description: Primary organisation domain
        domains:
          type: array
          items:
            type: string
          nullable: true
          description: Additional domains for auto-join
        domain_auto_join:
          type: boolean
          nullable: true
          description: Toggle domain-based auto-join for members
        domain_restrict:
          type: boolean
          nullable: true
          description: Restrict signups to the organisation's domain(s) only
        password_rotation_enabled:
          type: boolean
          nullable: true
          description: Enable or disable password rotation enforcement
        password_rotation_history_size:
          type: integer
          minimum: 1
          maximum: 24
          nullable: true
          description: Number of past passwords to remember (1-24)
        password_rotation_period:
          type: integer
          minimum: 3600
          nullable: true
          description: Password expiry period in seconds (minimum 1 hour)
        max_users:
          type: integer
          minimum: 1
          nullable: true
          description: Seat limit for the organisation. null means unlimited.
        legacy_org_id:
          type: string
          nullable: true
          description: Legacy organisation ID
        is_saml_configured:
          type: boolean
          nullable: true
          description: Toggle SAML configuration (write-only flag)
        isolated:
          type: boolean
          nullable: true
          description: Migrate to isolated SAML mode
    OrgListResponse:
      type: object
      required:
      - items
      - total
      - page
      - page_size
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Org'
        total:
          type: integer
          description: Total number of organisations
        page:
          type: integer
        page_size:
          type: integer
    UsersInOrgResponse:
      type: object
      required:
      - items
      - total
      - page
      - page_size
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              user_id:
                type: string
                format: uuid
              email:
                type: string
                format: email
              name:
                type: string
              role:
                type: string
              created_at:
                type: string
                format: date-time
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
    AddUserToOrgRequest:
      type: object
      required:
      - role
      properties:
        role:
          type: string
          description: Role to assign
    InviteUserToOrgRequest:
      type: object
      required:
      - email
      - role
      properties:
        email:
          type: string
          format: email
          description: Email to invite
        role:
          type: string
          description: Role to assign
    InviteUserToOrgByIdRequest:
      type: object
      required:
      - user_id
      properties:
        user_id:
          type: string
          format: uuid
          description: User ID to invite
        role:
          type: string
          description: Role to assign
    ChangeUserRoleRequest:
      type: object
      required: []
      properties:
        primary_role:
          type: string
          description: Primary role
        additional_roles:
