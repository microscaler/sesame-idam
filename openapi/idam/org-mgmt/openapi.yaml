openapi: 3.1.0
info:
  title: Organization Management Service
  version: 1.0.0
  description: 'Organization lifecycle, membership management, invitations, SSO/SAML/SCIM configuration, and application/role/permission definitions. Admin-heavy operations with low access frequency.

    '
  contact:
    name: Platform / Security
servers:
- url: /orgs
  description: Org Mgmt API
tags:
- name: Organizations
  description: Organization lifecycle (create, fetch, update, delete, query)
- name: Membership
  description: User-org relationships, invites, roles
- name: SSO
  description: Enterprise SAML/OIDC/SCIM per-organisation configuration
- name: Applications
  description: Register applications and define roles/permissions
- name: Roles
  description: Roles per application
- name: Permissions
  description: Permissions per application
- name: Webhooks
  description: Webhook subscription management for real-time event notifications
- name: AccountSecurity
  description: User-level security actions including API key invalidation
- name: SCIM
  description: SCIM 2.0 user provisioning for enterprise SSO
security:
- BearerAuth: []
- ApiKeyHeader: []
paths:
  /:
    get:
      tags:
      - Organizations
      summary: Query for organisations
      description: 'Paginated search for organisations. SaaS customers see only their own orgs.

        Platform admins see all orgs.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: query_orgs
      parameters:
      - &id001
        name: X-Tenant-ID
        in: header
        required: true
        schema:
          type: string
          format: uuid
        description: Tenant identifier. Routes the request to the correct tenant context for user lookup and authentication.
      - name: page_size
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: page_number
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: order_by
        in: query
        schema:
          type: string
          enum:
          - CREATED_AT_ASC
          - CREATED_AT_DESC
          - NAME
      - name: name
        in: query
        schema:
          type: string
        description: Name filter (substring match)
      - name: domain
        in: query
        schema:
          type: string
        description: Filter by domain match
      - name: legacy_org_id
        in: query
        schema:
          type: string
        description: Filter by legacy ID from previous auth system
      responses:
        '200':
          description: Organisation list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrgListResponse'
  /{org_id}:
    get:
      tags:
      - Organizations
      summary: Fetch organisation by ID
      description: 'Returns organisation details including SAML config, domain, metadata.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_org
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Organisation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Org'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
    put:
      tags:
      - Organizations
      summary: Update organisation
      description: 'Updates organisation fields. SaaS customers can only update their own orgs.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: update_org
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrgRequest'
      responses:
        '200':
          description: Organisation updated
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
    delete:
      tags:
      - Organizations
      summary: Delete organisation
      description: 'Irreversible deletion of organisation.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: delete_org
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: Organisation deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/users:
    get:
      tags:
      - Membership
      summary: Fetch users in organisation
      description: 'Returns users in this organisation with optional role filter.

        SaaS customers see only users in their own orgs.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_users_in_org
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: role
        in: query
        schema:
          type: string
        description: Filter by role (case-sensitive)
      - name: include_orgs
        in: query
        schema:
          type: boolean
        description: Include all orgs each user belongs to in response
      - name: page_size
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: page_number
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: Users in organisation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsersInOrgResponse'
    post:
      tags:
      - Membership
      summary: Add user to organisation
      description: 'Adds an existing user to this organisation with a specified role.

        SaaS customers can only add users to their own orgs.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: add_user_to_org
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddUserToOrgRequest'
      responses:
        '200':
          description: User added
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/invite-user:
    post:
      tags:
      - Membership
      summary: Invite user to organisation by email
      description: 'Sends an email invitation to join this organisation with a specified role.

        The invitee does not need to exist as a user yet.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: invite_user_to_org
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserToOrgRequest'
      responses:
        '200':
          description: Invite sent
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
  /{org_id}/invite-user-by-id:
    post:
      tags:
      - Membership
      summary: Invite existing user to organisation
      description: 'Invites an already-registered user to join this organisation.

        Sends an email notification.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: invite_user_to_org_by_id
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteUserToOrgByIdRequest'
      responses:
        '200':
          description: Invite sent
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
  /{org_id}/pending-invites:
    delete:
      tags:
      - Membership
      summary: Revoke pending organisation invite
      description: 'Cancels a pending invite. The invitee will no longer be able to accept.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: revoke_pending_invite
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeInviteRequest'
      responses:
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '204':
          description: Pending invite revoked
  /{org_id}/role-mappings:
    get:
      tags:
      - Membership
      summary: Fetch custom role mappings for organisation
      description: 'Returns the role configuration (e.g. "Free Plan", "Paid Plan") subscribed to this organisation.

        Plan-based roles automatically assign roles/permissions to all org members.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_role_mappings
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: Number of items per page (max 100)
      responses:
        '200':
          description: Role mappings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleMappingResponse'
  /{org_id}/subscribe-role-mapping:
    put:
      tags:
      - Membership
      summary: Subscribe organisation to a role mapping
      description: 'Links an organisation to a plan-based role configuration.

        E.g., "Paid Plan" → all members get Admin + Member roles.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: subscribe_org_to_role_mapping
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubscribeRoleMappingRequest'
      responses:
        '200':
          description: Subscription updated
        '400':
          description: Invalid mapping name
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/domains:
    put:
      tags:
      - Organizations
      summary: Update organisation domain settings
      description: 'Configures domain-based auto-join, restrictions, and extra domains for the organisation.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: update_org_domains
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrgDomainsRequest'
      responses:
        '200':
          description: Domains updated
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/allow-saml:
    post:
      tags:
      - SSO
      summary: Allow organisation to set up SAML SSO
      description: 'Enables SAML self-setup for this organisation. Users can configure their own SAML IdP.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: allow_org_saml
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: SAML setup allowed
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/disallow-saml:
    post:
      tags:
      - SSO
      summary: Disallow organisation from using SAML SSO
      description: 'Prevents this organisation from using SAML SSO. If SAML is already configured, it will be disabled.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: disallow_org_saml
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: SAML disabled
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/create-saml-link:
    post:
      tags:
      - SSO
      summary: Create SAML connection setup link
      description: 'Creates a link that allows SAML setup without requiring login or account creation.

        Useful for onboarding emails with self-serve SAML configuration.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: create_saml_link
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SamlLinkRequest'
      responses:
        '200':
          description: Connection link created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SamlConnectionLinkResponse'
  /{org_id}/saml-metadata:
    put:
      tags:
      - SSO
      summary: Set SAML IdP metadata for organisation
      description: 'Imports SAML Identity Provider metadata XML to configure SSO for this organisation.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: set_saml_idp_metadata
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
      responses:
        '200':
          description: SAML IdP metadata set
        '400':
          description: Invalid XML
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
  /{org_id}/oidc-metadata:
    post:
      tags:
      - SSO
      summary: Set OIDC IdP metadata for organisation
      description: 'Configures OIDC Identity Provider metadata for this organisation.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: set_oidc_idp_metadata
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OidcMetadataRequest'
      responses:
        '200':
          description: OIDC metadata set
        '400':
          description: Invalid metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
  /{org_id}/enable-saml:
    post:
      tags:
      - SSO
      summary: Enable SAML connection for organisation
      description: 'Activates the SAML connection so users can authenticate via SSO.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: enable_saml
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: SAML enabled
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/saml:
    delete:
      tags:
      - SSO
      summary: Delete SAML connection
      description: 'Removes the SAML configuration from this organisation.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: delete_saml
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '204':
          description: SAML connection deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/migrate-to-isolated:
    post:
      tags:
      - SSO
      summary: Migrate organisation to isolated SAML mode
      description: 'Moves the organisation to an isolated identity pool, separating SAML users from the main user database.

        Platform admin only.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: migrate_org_isolated
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Organisation migrated to isolated mode
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
  /{org_id}/scim/groups:
    get:
      tags:
      - SSO
      summary: Fetch SCIM groups for organisation
      description: 'Returns paginated list of SCIM groups for this organisation.

        Used for SCIM provisioning integrations.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_scim_groups
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page_size
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 10
      - name: page_number
        in: query
        schema:
          type: integer
          minimum: 0
          default: 0
      responses:
        '200':
          description: SCIM groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimGroupsResponse'
        '400':
          description: Invalid SCIM filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimError'
  /{org_id}/scim/groups/{group_id}:
    get:
      tags:
      - SSO
      summary: Fetch a specific SCIM group
      description: 'Returns a specific SCIM group by ID with member details.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_scim_group
      parameters:
      - *id001
      - name: org_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: group_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: Number of items per page (max 100)
      responses:
        '200':
          description: SCIM group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimGroup'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '400':
          description: Invalid SCIM filter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScimError'
  /api/v1/am/applications:
    get:
      tags:
      - Applications
      summary: List applications
      operationId: list_applications
      parameters:
      - *id001
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: Number of items per page (max 100)
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationListResponse'
      description: Requires `X-Tenant-ID` header for tenant resolution.
    post:
      tags:
      - Applications
      summary: Register application
      operationId: create_application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApplicationRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '400':
          description: Invalid request (e.g. slug already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
      parameters:
      - *id001
      description: Requires `X-Tenant-ID` header for tenant resolution.
  /api/v1/am/applications/{app_id}:
    get:
      tags:
      - Applications
      summary: Get application by id
      operationId: get_application
      parameters:
      - *id001
      - name: app_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Application'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
      description: Requires `X-Tenant-ID` header for tenant resolution.
  /api/v1/am/applications/{app_id}/roles:
    get:
      tags:
      - Roles
      summary: List roles for application
      operationId: list_roles
      parameters:
      - *id001
      - name: app_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
        description: Page number for pagination
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        description: Number of items per page (max 100)
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
      description: Requires `X-Tenant-ID` header for tenant resolution.
    post:
      tags:
      - Roles
      summary: Create role for application
      operationId: create_role
      parameters:
      - *id001
      - name: app_id
        in: path
        required: true
        schema:
          type: string
