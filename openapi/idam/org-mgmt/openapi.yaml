                - work
              primary:
                type: boolean
          description: Email addresses for the user
        active:
          type: boolean
          description: Whether the user is active
        roles:
          type: array
          items:
            type: string
          description: SCIM roles mapped to sesame-idam org roles
    ScimUserCreateRequest:
