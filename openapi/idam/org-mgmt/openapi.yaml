    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - invalid_request
          - invalid_credentials
          - invalid_grant
          - invalid_code
          - account_locked
          - mfa_required
          - email_not_confirmed
          - phone_not_verified
          - duplicate_email
          - weak_password
          - rate_limited
          - invalid_token
          - not_found
          - permission_denied
          - application_not_found
          - role_not_found
          - attribute_too_large
          description: Machine-readable error code
        error_description:
          type: string
          description: Human-readable error message
        hint:
          type: string
          description: Additional guidance for resolving the error
        retry_after:
          type: integer
          description: Retry-After seconds (only for rate_limited)
      example:
        error: invalid_request
        error_description: Bad request (validation error)
    ScimError:
      type: object
      description: SCIM 2.0 Error Response (RFC 7644 Section 3.7)
      required:
      - schemas
      - detail
      - status
      properties:
        schemas:
          type: array
          items:
            type: string
          example:
          - urn:ietf:params:scim:api:messages:2.0:Error
        detail:
          type: string
          description: Human-readable error message
        status:
          type: string
          description: HTTP status code as string (e.g., '400')
        scimType:
          type: string
          enum:
          - invalidFilter
          - uniqueness
          - value
          - mutability
          - invalidPath
          - noTarget
          - sensitive
          - tooMany
          description: SCIM error type per RFC 7643 Section 3.5.2
      example:
        schemas:
        - urn:ietf:params:scim:api:messages:2.0:Error
        detail: The requested attribute is not supported
        status: '400'
        scimType: invalidFilter
