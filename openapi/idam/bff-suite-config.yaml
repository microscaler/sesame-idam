# Sesame-IDAM Service Configuration
# Parsed by Tiltfile for service discovery and build ordering.
#
# In-cluster: all Services listen on ClusterIP :8080 (see EPIC-001 / justfile header).
# Optional Tilt host port-forwards (debug only): login 8101→8080, session 8105→8080.

bff_service_name: idam

services:
  identity-login-service:
    port: 8080
    spec_path: "identity-login-service"
  identity-session-service:
    port: 8080
    spec_path: "identity-session-service"
  identity-user-mgmt-service:
    port: 8080
    spec_path: "identity-user-mgmt-service"
  authz-core:
    port: 8080
    spec_path: "authz-core"
  api-keys:
    port: 8080
    spec_path: "api-keys"
  org-mgmt:
    port: 8080
    spec_path: "org-mgmt"
