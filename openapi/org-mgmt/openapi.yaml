      properties:
        name:
          type: string
          nullable: true
          description: Organisation name
        slug:
          type: string
          nullable: true
          description: Organisation slug (URL-safe identifier)
        logo_url:
          type: string
          format: uri
          nullable: true
          description: Organisation logo URL
        metadata:
          type: object
          additionalProperties: true
          nullable: true
          description: Free-form organisation metadata
        domain:
          type: string
          nullable: true
          description: Primary organisation domain
        domains:
          type: array
          items: { type: string }
          nullable: true
          description: Additional domains for auto-join
        domain_auto_join:
          type: boolean
