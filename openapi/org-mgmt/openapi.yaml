    WebhookEvent:
      type: object
      required: [event_id, event_type, org_id, timestamp, data]
      properties:
        event_id:
          type: string
          format: uuid
          description: Unique ID for this webhook event
        event_type:
          type: string
          description: The event type that triggered this notification
        org_id:
          type: string
          format: uuid
          description: Organisation ID this event relates to
        timestamp:
          type: string
          format: date-time
          description: When the event occurred
        data:
          type: object
          additionalProperties: true
          description: Event-specific payload data
        delivery_attempts:
          type: integer
          description: Number of delivery attempts for this event

