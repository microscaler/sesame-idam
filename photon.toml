name = "sesame-idam"

k8s_namespace = "sesame-idam"

docker_image_prefix = "localhost:5001/sesame-idam-%s-%s"
helm_chart_path = "helm/sesame-idam-microservice"

generate_bff = false
shared_kind_infra = true

brrtrouter_path = "../BRRTRouter"

# Port range — photon auto-assigns all discovered idam services from 8601–8650.
# Current ports (8101-8106) will be remapped. See ~/.config/photon/global_ports.yaml.
port_base = "8601"

[[suites]]
name = "idam"
openapi_dir = "openapi/idam"
microservices_dir = "microservices/idam"
