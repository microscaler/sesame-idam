# Default values for sesame-idam-microservice (same pattern as RERP)
# Override in values/authentication.yaml and values/authorization.yaml
# Database: Supabase stack from microscaler-supabase (namespace data). Host: postgres.data.svc.cluster.local, db: postgres, user: postgres (local dev).

service:
  name: ""
  port: 8080
  containerPort: 8080
  nodePort: null

image:
  repository: localhost:5001
  name: ""
  tag: tilt
  pullPolicy: IfNotPresent

deployment:
  replicas: 1
  namespace: sesame-idam

app:
  binaryName: ""
  serviceName: ""
  config:
    security:
      api_keys:
        ApiKeyHeader:
          key: "test123"
    http:
      keep_alive: true
      timeout_secs: 5
      max_requests: 50000
    database:
      host: "postgres.data.svc.cluster.local"
      port: 5432
      name: "sesame_idam"
      user: "sesame_idam"
      password: "dev_password_change_in_prod"
      max_connections: 2
    redis:
      # Shared platform Redis (namespace data, shared-k8s-cluster)
      host: "redis.data.svc.cluster.local"
      port: 6379
      db: 0
      max_connections: 4
    observability:
      otlp_endpoint: ""
    # SMS (ADR-009). `mock` records to a Redis outbox — nothing is spent.
    # Set provider=twilio once the platform credentials Secret is populated.
    sms:
      provider: "mock"
      allowedPurposes: "registration,password_reset,tenant_registration,environment_registration,tenant_owner_recovery,platform_operator"
      platformDailyCeilingCents: 1000

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

env:
  RUST_LOG: "debug"
  RUST_BACKTRACE: "1"
  BRRTR_LOG_FORMAT: "json"
  BRRTR_STACK_SIZE: "0x8000"

serviceType: ClusterIP

prometheus:
  enabled: true
  port: 9090
  path: "/metrics"
