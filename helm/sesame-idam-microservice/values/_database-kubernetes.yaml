# Shared database + redis configuration for sesame-idam microservices.
# Mirrors hauliage helm/hauliage-microservice/values/_database-kubernetes.yaml
# and _redis-shared-kind.yaml.
# Keys live under app.config.* because templates read .Values.app.config.database.*
# (deployment.yaml env vars and configmap.yaml config.yaml render).
# Postgres and Redis are the shared-k8s platform instances in namespace `data`
# (shared-k8s-cluster k8s/platform-data/data). Read replicas available at
# postgres-replica-0.data.svc.cluster.local / postgres-replica-1.data.svc.cluster.local.

app:
  config:
    database:
      host: "postgres.data.svc.cluster.local"
      port: 5432
      name: "sesame_idam"
      user: "sesame_idam"
      # Local dev default — must match scripts/setup-db.sh
      # (SESAME_IDAM_DB_PASSWORD); real deployments override via the
      # sesame-idam-db-credentials Secret.
      password: "dev_password_change_in_prod"
      max_connections: 10
    redis:
      host: "redis.data.svc.cluster.local"
      port: 6379
      db: 0
      max_connections: 10
