service:
  name: org-mgmt
  port: 8080
  containerPort: 8080
  nodePort: null

image:
  repository: localhost:5001
  name: sesame-idam-org-mgmt
  tag: tilt
  pullPolicy: IfNotPresent

deployment:
  replicas: 1
  namespace: sesame-idam

app:
  binaryName: org-mgmt
  serviceName: org-mgmt
  config:
    security:
      jwks:
        BearerAuth:
          jwks_url: "http://identity-session-service.sesame-idam.svc.cluster.local:8080/idam/v1/.well-known/jwks.json"
          iss: "https://idam.example.com"
          aud: "sesame-idam"
      api_keys:
        ApiKeyHeader:
          key: "test123"
    http:
      keep_alive: true
      timeout_secs: 5
      max_requests: 50000
    # database/redis wiring comes from values/_database-kubernetes.yaml
    # (merged after this file by the Tiltfile helm() call).

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

healthCheck:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2

env:
  RUST_LOG: "debug"
  RUST_BACKTRACE: "1"
  BRRTR_LOG_FORMAT: "json"
  BRRTR_STACK_SIZE: "0x8000"

serviceType: ClusterIP

prometheus:
  enabled: true
  port: 9090
  path: "/metrics"
