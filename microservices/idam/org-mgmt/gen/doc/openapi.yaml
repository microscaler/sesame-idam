components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier (UUID)
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token (from Identity Service)
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
    CreateOrgRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Organisation name
        slug:
          type: string
          description: Organisation slug (URL-safe identifier)
        logo_url:
          type: string
          format: uri
          description: Organisation logo URL
        domain:
          type: string
          description: Primary organisation domain
        domains:
          type: array
          items:
            type: string
          description: Additional domains for auto-join
        domain_auto_join:
          type: boolean
          default: false
          description: Enable domain-based auto-join for members
        domain_restrict:
          type: boolean
          default: false
          description: Restrict signups to the organisation's domain(s) only
        password_rotation_enabled:
          type: boolean
          default: false
          description: Enforce password rotation for all org users
        password_rotation_history_size:
          type: integer
          default: 5
          minimum: 1
          maximum: 24
          description: Number of past passwords to remember (to prevent reuse)
        password_rotation_period:
          type: integer
          default: 2592000
          minimum: 3600
          description: Password expiry period in seconds (default 30 days)
        max_users:
          type:
          - integer
          - 'null'
          minimum: 1
          description: Maximum number of users allowed in the organisation (seat limit).
            null means unlimited.
        legacy_org_id:
          type:
          - string
          - 'null'
          description: Legacy organisation ID from a previous auth system
        metadata:
          type: object
          additionalProperties: true
          description: Free-form organisation metadata
    Org:
      type: object
      required:
      - id
      - name
      - slug
      - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Organisation ID
        name:
          type: string
          description: Organisation name
        slug:
          type: string
          description: Organisation slug
        logo_url:
          type: string
          format: uri
          description: Organisation logo URL
        domain:
          type: string
          nullable: true
          description: Primary organisation domain
        domains:
          type: array
          items:
            type: string
          nullable: true
          description: Additional domains for auto-join
        domain_auto_join:
          type: boolean
          default: false
          description: Whether domain-based auto-join is enabled for members
        domain_restrict:
          type: boolean
          default: false
          description: Whether signups are restricted to the organisation's domain(s)
            only
        password_rotation_enabled:
          type: boolean
          default: false
          description: Whether password rotation is enforced for all org users
        password_rotation_history_size:
          type: integer
          default: 5
          description: Number of past passwords remembered to prevent reuse
        password_rotation_period:
          type: integer
          default: 2592000
          description: Password expiry period in seconds (default 30 days)
        max_users:
          type:
          - integer
          - 'null'
          description: Maximum number of users allowed (seat limit). null means unlimited.
        legacy_org_id:
          type:
          - string
          - 'null'
          description: Legacy organisation ID from a previous auth system
        metadata:
          type:
          - object
          - 'null'
          additionalProperties: true
          description: Free-form organisation metadata
        is_saml_configured:
          type: boolean
          default: false
          description: Whether SAML SSO is configured for this org
        is_saml_in_test_mode:
          type: boolean
          default: false
          description: Whether SAML is in test mode
        can_setup_saml:
          type: boolean
          default: true
          description: Whether the org can configure SAML SSO
        isolated:
          type: boolean
          default: false
          description: Whether the org uses isolated SAML (separate identity pool)
        sso_trust_level:
          type:
          - string
          - 'null'
          description: "SAML trust level \u2014 AlwaysTrust, NeverTrust, TrustForDomain"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        id: 31c41c16-c281-44ae-9602-8a047e3bf33d
        name: Acme Logistics
        slug: acme-logistics
        logo_url: https://cdn.example.com/logos/acme.png
        domain: acme-logistics.com
        domains:
        - acme-logistics.com
        created_at: '2024-01-01T00:00:00Z'
        updated_at: '2024-06-15T12:00:00Z'
