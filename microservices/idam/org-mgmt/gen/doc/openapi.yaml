    CreateWebhookSubscriptionRequest:
      type: object
      required:
      - endpoint_url
      - events
      properties:
        endpoint_url:
          type: string
          format: uri
          description: The URL to receive webhook events
        events:
          type: array
          items:
            type: string
            enum:
            - org.created
            - org.updated
            - org.deleted
            - user.joined
            - user.left
            - user.role_changed
            - user.enabled
            - user.disabled
            - invite.created
            - invite.accepted
            - invite.revoked
            - role_assigned
            - role_removed
            - domain_added
            - domain_removed
            - saml_configured
            - saml_disabled
          description: List of events to subscribe to
        secret:
          type:
          - string
          - 'null'
          description: Optional shared secret for signing webhook payloads (HMAC-SHA256)
        enabled:
          type: boolean
          default: true
          description: Whether this webhook is currently active
        metadata:
          type:
          - object
          - 'null'
          additionalProperties: true
          description: Custom key-value metadata
    UpdateWebhookSubscriptionRequest:
      type: object
      properties:
        endpoint_url:
          type:
          - string
          - 'null'
          format: uri
          description: New endpoint URL
        events:
          type:
          - array
          - 'null'
          items:
            type: string
          description: Updated list of subscribed events
        secret:
          type:
          - string
          - 'null'
          description: Optional new shared secret for signing
        enabled:
          type:
          - boolean
          - 'null'
          description: Toggle webhook enabled status
        metadata:
          type:
          - object
          - 'null'
          additionalProperties: true
          description: Updated metadata
    WebhookSubscription:
      type: object
      properties:
        subscription_id:
          type: string
          format: uuid
          description: Unique ID of the webhook subscription
        org_id:
          type: string
          format: uuid
          description: Organisation ID this subscription belongs to
        endpoint_url:
          type: string
          format: uri
          description: The URL to receive webhook events
        events:
          type: array
          items:
            type: string
          description: List of subscribed events
        secret_present:
          type: boolean
          description: Whether a signing secret is configured (never returns the actual
            secret)
        enabled:
          type: boolean
          description: Whether this webhook is currently active
        last_delivery_at:
          type:
          - string
          - 'null'
          format: date-time
          description: Timestamp of the last successful delivery
        last_delivery_status:
          type:
          - string
          - 'null'
          description: HTTP status of the last delivery attempt
        total_deliveries:
          type: integer
          description: Total number of delivery attempts
        failed_deliveries:
          type: integer
          description: Number of failed delivery attempts
        created_at:
          type: string
          format: date-time
          description: When the subscription was created
        updated_at:
          type: string
          format: date-time
          description: When the subscription was last updated
