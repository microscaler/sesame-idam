[package]
name = "sesame_idam_org_mgmt_gen"
version = "0.1.0"
edition = "2021"

[features]
default = []
# jemalloc is opt-in (--features jemalloc). On armv7-unknown-linux-musleabihf and other musl
# targets, tikv-jemallocator can pull in compiler-rt symbols (e.g. __ffsdi2) that are not
# provided by musl, causing link errors. Use default = [] and enable jemalloc only for
# amd64/arm64 glibc builds where it is supported. See: https://github.com/rust-lang/compiler-builtins
jemalloc = ["tikv-jemallocator"]

# Gen crates expose request/response types in handlers/types.rs that are only constructed
# in the impl crate (via serde). When CI runs clippy -p <gen> -- -D warnings, those types
# are reported as dead code unless we allow it here.
[lints.rust]
dead_code = "allow"

[dependencies]
# NOTE: Additional dependencies can be configured via brrtrouter-dependencies.toml
# Place brrtrouter-dependencies.toml alongside your openapi.yaml file.
# BRRTRouter will auto-detect it and include dependencies from:
#   - [dependencies] section (always included)
#   - [conditional] section (included if types are detected)
# See: https://github.com/microscaler/BRRTRouter/blob/main/DEPENDENCIES_CONFIG_GUIDE.md

brrtrouter = { workspace = true }
brrtrouter_macros = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
config = { workspace = true }
http = { workspace = true }
may = { workspace = true }
may_minihttp = { workspace = true, features = ["client"] }
http_legacy = { workspace = true }
anyhow = { workspace = true }
# Same pin as workspace `brrtrouter` — generated `main.rs` uses `arc_swap::ArcSwap` (Phase 1).
# Consumer `Cargo.toml` [workspace.dependencies] must include: arc-swap = "1.7" (or matching pin).
arc-swap = { workspace = true }
clap = { workspace = true }
tikv-jemallocator = { workspace = true, optional = true }