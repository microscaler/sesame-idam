# BRRTRouter application configuration (YAML)
# Adjust values per environment and reload/restart the app.

security:
  jwks:
    BearerAuth:
      jwks_url: "http://identity-session-service:8080/idam/v1/.well-known/jwks.json"
      # Gate A6: iss matches the issuer's SESAME_JWT_ISSUER; aud is THIS
      # service's audience (issued tokens enumerate their consumers via
      # JWT_ISSUE_AUDIENCES — a token not minted for this service is rejected
      # here with an aud mismatch).
      iss: "https://idam.example.com"
      aud: "identity-login"
      leeway_secs: 60
      cache_ttl_secs: 300
  api_keys:
    ApiKeyHeader:
      key: "test123"
    PlatformServiceAuth:
      key: "dev-platform-admin"
http:
  keep_alive: true
  timeout_secs: 5
  max_requests: 5000

# Gate A5: CORS locked to explicit origins — no wildcard (dev defaults below
# cover the local frontends; staging/prod inject their exact origins via the
# CORS_ALLOWED_ORIGINS env override, comma-separated). Without a cors section
# BRRTRouter still installs CORS middleware with an empty origin list and
# rejects cross-origin requests.
cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "Accept"
    - "X-API-Key"
    - "X-Platform-Admin-Key"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_credentials: false
