  /oauth/authorize:
    get:
      tags:
      - Sessions
      summary: OAuth2 authorization endpoint
      description: 'Redirects user to the Sesame login page. Compatible with `code` response type.

        After successful login, redirects to `redirect_uri` with `code` parameter.

        Supports PKCE for public clients.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: oauth_authorize
      security: []
      parameters:
      - *id007
      - name: client_id
        in: query
        required: true
        schema:
          type: string
        description: OAuth2 client ID
      - name: response_type
        in: query
        required: true
        schema:
          type: string
          enum:
          - code
        description: Must be `code` for authorization code flow
      - name: redirect_uri
        in: query
        required: true
        schema:
          type: string
          format: uri
        description: Registered redirect URI
      - name: state
        in: query
        required: true
        schema:
          type: string
        description: CSRF protection state parameter
      - name: scope
        in: query
        schema:
          type: string
        description: Requested scopes (openid, email, profile, etc.)
      - name: code_challenge
        in: query
        schema:
          type: string
        description: PKCE code challenge (S256)
      - name: code_challenge_method
        in: query
        schema:
          type: string
          enum:
          - S256
          - plain
        description: PKCE method
      responses:
        '400':
          description: "Bad request \u2014 validation error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '302':
          description: Redirect to login page or back with authorization code
        '401':
          description: "Unauthorized \u2014 invalid, expired, or missing credentials"
          content: *id009
        '500':
          description: Internal server error
          content: *id006
      x-consumer: frontend
      x-consumer-note: OAuth authorization endpoint called by frontend browser
  /auth/users/me:
    get:
      tags:
      - UserManagement
      summary: Get current user profile with PII
      description: 'Returns the authenticated user''s full profile including PII fields.


        This is the designated endpoint for fetching PII that was removed from JWT tokens in Story 2.3.


        Requires a valid Bearer token with an active session.'
      operationId: get_user_profile
      responses:
        '200':
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
              example:
                user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                email: alice@example.com
                email_verified: true
                phone_number: '+14155551234'
                phone_verified: false
                first_name: Alice
                last_name: Smith
                name: Alice Smith
                preferred_username: asmith
        '401':
          description: "Unauthorized \u2014 invalid, expired, or missing credentials"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                error_description: Authentication required
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: internal_error
                error_description: An unexpected error occurred
      security:
      - BearerAuth: []
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier (UUID)
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token (from Identity Service)
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
  schemas:
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - invalid_request
          - invalid_credentials
          - invalid_grant
          - invalid_code
          - account_locked
          - mfa_required
          - email_not_confirmed
          - phone_not_verified
          - duplicate_email
          - weak_password
          - rate_limited
          - invalid_token
          - not_found
          description: Machine-readable error code
        error_description:
          type: string
          description: Human-readable error message
        retry_after:
          type: integer
          description: Retry-After seconds (only for rate_limited)
        hint:
          type: string
          description: Additional guidance for resolving the error
      example:
        error: invalid_request
        error_description: Unauthorized (invalid or missing token)
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          description: Primary email address
        password:
          type: string
          minLength: 8
          description: User's password
        organization_id:
          type: string
          format: uuid
          nullable: true
          description: Optional org hint for multi-tenant login
      example: *id038
    TokenResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - refresh_token
      - user_id
      properties:
        access_token:
          type: string
          description: JWT access token (valid for 15 minutes by default)
        token_type:
          type: string
          enum:
          - Bearer
          description: Always "Bearer"
        expires_in:
          type: integer
          description: 'Access token lifetime in seconds (default: 900)'
        refresh_token:
          type: string
          description: Refresh token for obtaining new access tokens
        refresh_token_expires_in:
          type: integer
          description: 'Refresh token lifetime in seconds (default: 2592000 = 30 days)'
        user_id:
          type: string
          format: uuid
          description: UUID of the authenticated user
        mfa_required:
          type: boolean
          description: Whether MFA is required for this user
        id_token:
          type: string
          nullable: true
          description: OpenID Connect ID token (present in OIDC flows)
        scope:
          type: string
          nullable: true
          description: Granted OAuth scopes
        entitlements_ref:
          type: string
          description: 'Deterministic reference to the user''s entitlements snapshot (format: ent_<uuid_v5>)'
          example: ent_a1b2c3d4-e5f6-7890-abcd-ef1234567890
        entitlements_hash:
          type: string
          description: 'SHA-256 hash of the canonical JSON representation of the entitlements snapshot (format: sha256:<hex>)'
          example: sha256:a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
        roles:
          type: array
          items:
            type: string
          description: User's roles within the organization
          example:
          - admin
          - billing-viewer
        permissions:
          type: array
          items:
            type: string
          description: Bounded set of permissions from the entitlements snapshot
          example:
          - org:admin
          - billing:read
        token_version:
          type: integer
          format: int64
          description: Monotonically increasing token version (for revocation). Each token issue increments this value. Used by consumers to detect stale permissions.
          example: 42
      example: *id039
    PendingEmailVerificationResponse:
      type: object
      required:
      - user_id
      - email
      - email_verified
      properties:
        user_id:
          type: string
          format: uuid
          description: UUID of the newly created user
        email:
          type: string
          format: email
          description: Email address (unverified)
        email_verified:
          type: boolean
          description: "Always false \u2014 user must confirm via email link"
        message:
          type: string
          example: A confirmation email has been sent. Please verify your email to complete registration.
    MfaRequiredResponse:
      type: object
      required:
      - mfa_required
      - challenge_type
      properties:
        mfa_required:
          type: boolean
          example: true
        challenge_type:
          type: string
          enum:
          - totp
          - sms
          - email
          - webauthn
          description: Type of MFA challenge to complete
        session_id:
          type: string
          format: uuid
          description: Session identifier for completing the MFA step
        expires_in:
          type: integer
          description: Seconds until the MFA challenge expires
      example: *id040
    EmailOTPRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          description: Email address to send OTP to
      example: *id041
    EmailOTPVerifyRequest:
      type: object
      required:
      - email
      - code
      properties:
        email:
          type: string
          format: email
          description: Email address that received the OTP
        code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit OTP code sent to email
      example: *id042
    PhoneOTPRequest:
      type: object
      required:
      - phone
      properties:
        phone:
          type: string
          pattern: ^\\+[1-9]\\d{1,14}$
          description: Phone number in E.164 format (e.g. +14155551234)
      example: *id043
    PhoneOTPVerifyRequest:
      type: object
      required:
      - phone
      - code
      properties:
        phone:
          type: string
          pattern: ^\\+[1-9]\\d{1,14}$
          description: Phone number that received the OTP (E.164 format)
        code:
          type: string
          minLength: 6
          maxLength: 6
          description: 6-digit SMS OTP code
      example: *id044
    DualOTPRequest:
      type: object
      required:
      - email
      - phone
      properties:
        email:
          type: string
          format: email
          description: Email address to send OTP to
        phone:
          type: string
          pattern: ^\\+[1-9]\\d{1,14}$
          description: Phone number in E.164 format (e.g. +14155551234)
        send_welcome_email:
          type: boolean
          default: false
          description: Send welcome email after successful verification
      example: *id045
    DualOTPResponse:
      type: object
      required:
      - success
      - email_sent
      - phone_sent
      properties:
        success:
          type: boolean
          example: true
        email_sent:
          type: boolean
          description: Whether OTP was sent to email
        phone_sent:
          type: boolean
          description: Whether OTP was sent to phone
        email_verified:
          type: boolean
          example: false
          description: Whether email was previously verified
        phone_verified:
          type: boolean
          example: false
          description: Whether phone was previously verified
        both_verified:
          type: boolean
          example: false
          description: Whether both were already verified (auto-complete login)
        message:
          type: string
          example: Verification codes have been sent to your email and phone
      example: *id046
    DualOTPVerifyRequest:
      type: object
      required:
      - email
      - phone
      properties:
        email:
          type: string
          format: email
          description: Email address to verify
        email_code:
          type: string
          minLength: 6
          maxLength: 6
          nullable: true
          description: 6-digit email OTP code (omit if already verified)
        phone:
          type: string
          pattern: ^\\+[1-9]\\d{1,14}$
          description: Phone number to verify (E.164 format)
        phone_code:
          type: string
          minLength: 6
          maxLength: 6
          nullable: true
          description: 6-digit phone OTP code (omit if already verified)
        session_id:
          type: string
          format: uuid
          description: Session ID from the dual-otp send step
      example: *id047
    DualOTPCompleteResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - refresh_token
      - user_id
      allOf:
      - $ref: '#/components/schemas/TokenResponse'
      properties:
        newly_verified_email:
          type: boolean
          description: Whether email was just verified in this operation
        newly_verified_phone:
          type: boolean
          description: Whether phone was just verified in this operation
      example: *id048
    DualOTPPartialResponse:
      type: object
      required:
      - success
      - email_verified
      - phone_verified
      - both_verified
      properties:
        success:
          type: boolean
          example: true
        email_verified:
          type: boolean
          description: Current email verification status
        phone_verified:
          type: boolean
          description: Current phone verification status
        both_verified:
          type: boolean
          description: "Always false \u2014 both codes still needed"
        message:
          type: string
          example: Email verified. Please verify your phone to complete login.
      example: *id049
    RegisterRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          description: Primary email address (must be unique)
        password:
          type: string
          minLength: 8
          maxLength: 128
          description: User's password (minimum 8 characters)
        first_name:
          type: string
          maxLength: 100
          nullable: true
          description: User's first name
        last_name:
          type: string
          maxLength: 100
          nullable: true
          description: User's last name
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          nullable: true
          description: Optional human-identifiable username
        phone:
          type: string
          pattern: ^\\+[1-9]\\d{1,14}$
          nullable: true
          description: Phone number in E.164 format (for dual verification flow)
      example: *id050
    TokenRequest:
      type: object
      required:
      - grant_type
      properties:
        grant_type:
          type: string
          enum:
          - refresh_token
          - client_credentials
          - urn:ietf:params:oauth:grant-type:token-exchange
          description: OAuth2 grant type
        refresh_token:
          type: string
          description: Refresh token (required for refresh_token grant)
        scope:
          type: string
          description: Requested scopes (space-separated)
        client_id:
          type: string
          description: Client ID (required for client_credentials and token exchange)
        client_secret:
          type: string
          description: Client secret (required for client_credentials and token exchange)
        subject_token:
          type: string
          description: Subject token for token exchange (RFC 8693)
        subject_token_type:
          type: string
          enum:
          - urn:ietf:params:oauth:token-type:access_token
          - urn:ietf:params:oauth:token-type:refresh_token
          description: Type of the subject token
        requested_token_type:
          type: string
          enum:
          - urn:ietf:params:oauth:token-type:access_token
          - urn:ietf:params:oauth:token-type:refresh_token
          description: Type of token being requested
        actor_token:
          type: string
          description: Optional actor token for nested delegation (RFC 8693)
      example: *id051
    TokenExchangeResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - issued_token_type
      properties:
        access_token:
          type: string
          description: New access token with act claim for delegated access
        refresh_token:
          type: string
          description: New rotating refresh token
        token_type:
          type: string
          enum:
          - Bearer
          description: Always "Bearer"
        expires_in:
          type: integer
          description: 'Access token lifetime in seconds (default: 900)'
        scope:
          type: string
          description: Granted scopes (space-delimited)
        issued_token_type:
          type: string
          enum:
          - urn:ietf:params:oauth:token-type:access_token
          description: Type of issued token
        iss:
          type: string
          description: 'Issuer of the token (RFC 8693 F-003). Default: idam issuer URL.'
        aud:
          type: array
          items:
            type: string
          description: "Audience(s) for the token \u2014 merged from subject and actor audiences (RFC 8693 F-012)"
        iat:
          type: integer
          format: int64
          description: Issued-at Unix timestamp (RFC 8693 F-003)
      example:
        access_token: eyJhbG...ifX0.sig
        refresh_token: bmV3LXJlZnJlc2gtdG9rZW4tZXhjaGFuZ2U
        token_type: Bearer
        expires_in: 900
        scope: profile:read orders:write
        issued_token_type: urn:ietf:params:oauth:token-type:access_token
        iss: https://idam.example.com
        aud:
        - myapp.com
        - support-portal.com
        iat: 1715000000
    ForgotPasswordRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          description: Email address to send reset link to
      example: *id052
    ResetPasswordRequest:
      type: object
      required:
      - token
      - new_password
      properties:
        token:
          type: string
          description: Password reset token from the reset email
        new_password:
          type: string
          minLength: 8
          description: New password (minimum 8 characters)
      example: *id053
    LogoutRequest:
      type: object
      properties:
        refresh_token:
          type: string
          description: The refresh token to revoke. Required only if no Authorization header is present. If the session is
            identified via the Bearer token in the Authorization header, this field is optional.
      description: Request body for logout operation. Either the refresh_token in the body OR the Bearer token in the Authorization
        header can be used to identify the session to revoke. If both are provided, the refresh_token is preferred.
      example: *id054
    SocialCallbackRequest:
      type: object
      required:
      - code
      - state
      properties:
        code:
          type: string
          description: Authorization code from the OAuth provider redirect
        state:
          type: string
          description: CSRF state parameter (must match the one from login)
        redirect_uri:
          type: string
          format: uri
          description: Redirect URI used in the initial login request
    SocialLoginResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      - refresh_token
      - user_id
      - social_provider
      properties:
        access_token:
          type: string
          description: JWT access token
        token_type:
          type: string
          enum:
          - Bearer
          description: Always "Bearer"
        expires_in:
          type: integer
          description: Access token lifetime in seconds
        refresh_token:
          type: string
          description: Refresh token
        user_id:
          type: string
          format: uuid
          description: UUID of the authenticated user
        social_provider:
          type: string
          description: OAuth provider name (e.g., "github", "google")
        social_provider_user_id:
          type: string
          description: User ID from the social provider
    SignupValidationRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          description: Email address to validate for registration
        phone:
          type: string
          pattern: ^\+[1-9]\d{1,14}$
          description: Phone number in E.164 format to validate for registration
    SignupValidationResponse:
      type: object
      required:
      - allowed
      properties:
        allowed:
          type: boolean
          description: Whether the email/phone is allowed to register
        reasons:
          type: array
          items:
            type: string
          description: List of rejection reasons (empty if allowed)
        requires_mfa:
          type: boolean
          description: Whether the user will need MFA after registration
      example: *id055
    MagicLinkRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
          description: Email address to send magic link to
      example: *id056
    MagicLinkResponse:
      type: object
      required:
      - magic_link_sent
      properties:
        magic_link_sent:
          type: boolean
          example: true
          description: Whether magic link was sent
        expires_in:
          type: integer
          example: 900
          description: Seconds until expiration
      example: *id057
    MagicLinkVerifyRequest:
      type: object
      required:
      - token
      properties:
        token:
          type: string
          description: Magic link token from the URL
      example: *id058
    SmsMagicLinkRequest:
      type: object
      required:
      - phone
      properties:
        phone:
          type: string
          pattern: ^\+[1-9]\d{1,14}$
          description: Phone number in E.164 format
      example: *id059
    SmsMagicLinkResponse:
      type: object
      required:
      - magic_link_sent
      properties:
        magic_link_sent:
          type: boolean
          example: true
          description: Whether SMS magic link was sent
        expires_in:
          type: integer
          example: 900
          description: Seconds until expiration
      example: *id060
    SmsMagicLinkVerifyRequest:
      type: object
      required:
      - phone
      - token
      properties:
        phone:
          type: string
          pattern: ^\+[1-9]\d{1,14}$
          description: Phone number that received the SMS
        token:
          type: string
          description: Magic link token from the SMS URL
