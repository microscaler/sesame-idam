                value: &id051
                  grant_type: refresh_token
                  refresh_token: cmVmcmVzaC10b2tlbi1hbGljZS1zZXNzaW9u
                  client_id: my-app
            example: *id028
      responses:
        '200':
          description: Token issued or refreshed
