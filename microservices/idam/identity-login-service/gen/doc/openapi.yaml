    EntitlementsSnapshot:
      type: object
      required:
      - version
      - permissions
      - roles
      - tenant
      properties:
        version:
          type: integer
          description: Entitlements version, bumped on permission changes
        permissions:
          type: array
          items:
            type: string
          description: Full list of permissions for this user/organization combination
        roles:
          type: array
          items:
            type: string
          description: Roles assigned to this user
        tenant:
          type: string
          format: uuid
          description: Tenant identifier for multi-tenant isolation
        hash:
          type: string
          description: SHA-256 hash of the canonical JSON of this snapshot
    UserProfileResponse:
      type: object
      required:
      - user_id
      - email
      - email_verified
      properties:
        user_id:
          type: string
          format: uuid
          description: UUID of the user
        email:
          type: string
          format: email
          description: User's email address
        email_verified:
          type: boolean
          description: Whether the email has been verified
        phone_number:
          type: string
          pattern: ^\+[1-9]\d{1,14}$
          nullable: true
          description: Phone number in E.164 format
        phone_verified:
          type: boolean
          description: Whether the phone has been verified
        first_name:
          type: string
          nullable: true
          description: User's first name
        last_name:
          type: string
          nullable: true
          description: User's last name
        name:
          type: string
          nullable: true
