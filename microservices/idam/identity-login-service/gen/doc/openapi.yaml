                    both_verified: false
                    message: Email verified. Please verify your phone to complete login.
              example: *id032
        '401':
          description: "Unauthorized \u2014 invalid, expired, or missing credentials"
          content: *id009
        '500':
          description: Internal server error
          content: *id006
      parameters:
      - *id033
      x-consumer: frontend
      x-consumer-note: Direct browser call to verify dual OTP
      x-brrtrouter-impl: true
