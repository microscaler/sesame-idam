# BRRTRouter application configuration (YAML)
# Adjust values per environment and reload/restart the app.

# Gate A6 note: identity-session-service is the ISSUER / JWKS provider — it
# serves /.well-known/jwks.json and does not validate inbound Bearer JWTs, so
# it deliberately has no security.jwks (iss/aud) section. Every consumer
# service sets its own service-specific aud.
security:
  api_keys:
    ApiKeyHeader:
      key: "test123"

# JWT token TTL configuration (Story 3.3)
# All access tokens use 5-minute (300s) TTL after F-010 alignment.
# Environment variables override these values:
#   JWT_ACCESS_TTL_NORMAL, JWT_ACCESS_TTL_ELEVATED,
#   JWT_ACCESS_TTL_ADMIN, JWT_ACCESS_TTL_PLATFORM,
#   JWT_REFRESH_TTL_DAYS, JWT_ADMIN_REFRESH_TTL_DAYS
jwt:
  access_token:
    normal_ttl_secs: 300
    elevated_ttl_secs: 300
    admin_ttl_secs: 300
    platform_ttl_secs: 300
  refresh_token:
    normal_ttl_days: 30
    admin_ttl_days: 7

http:
  keep_alive: true
  timeout_secs: 5
  max_requests: 5000

# Gate A5: explicit origins only (no wildcard); staging/prod override via
# CORS_ALLOWED_ORIGINS (comma-separated).
cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "Accept"
    - "X-API-Key"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_credentials: false
