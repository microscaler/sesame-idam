# BRRTRouter application configuration (YAML)
# Adjust values per environment and reload/restart the app.

security:
  jwks:
    BearerAuth:
      jwks_url: "http://identity-session-service:8080/idam/v1/.well-known/jwks.json"
      # Gate A6: aud is THIS service's audience; tokens not minted for it
      # (JWT_ISSUE_AUDIENCES at the issuer) are rejected with aud mismatch.
      iss: "https://idam.example.com"
      aud: "api-keys"
      leeway_secs: 60
      cache_ttl_secs: 300
  api_keys:
    ApiKeyHeader:
      key: "test123"
http:
  keep_alive: true
  timeout_secs: 5
  max_requests: 5000

# Gate A5: explicit origins only (no wildcard); staging/prod override via
# CORS_ALLOWED_ORIGINS (comma-separated).
cors:
  origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:5173"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "Accept"
    - "X-API-Key"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_credentials: false
