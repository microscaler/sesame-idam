    ApiKey:
      type: object
      properties:
        api_key_id:
          type: string
          format: uuid
          description: Unique ID of the API key
        name:
          type: string
          description: Human-readable name
        user_id:
          type:
          - string
          - 'null'
          format: uuid
          description: User ID if user-scoped
        org_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Organisation ID if org-scoped
        created_at:
          type: integer
          format: int64
          description: Unix timestamp of creation
        expires_at:
          type: integer
          format: int64
          nullable: true
