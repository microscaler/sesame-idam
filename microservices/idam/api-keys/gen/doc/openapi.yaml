        org_id:
          type:
          - string
          - 'null'
          format: uuid
          description: Organisation ID if org-scoped
        created_at:
          type: integer
          format: int64
          description: Unix timestamp of creation
        expires_at:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp of expiration (null = no expiry)
        permissions:
          type: array
          items:
            type: string
          description: Permission codes granted by this key
