[package]
name = "sesame-common"
version.workspace = true
edition.workspace = true
description = "Shared JWT claim types, validation, and builder for Sesame-IDAM microservices"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
thiserror = { workspace = true }
sha2 = { workspace = true }
uuid = { workspace = true, features = ["v5", "std"] }
chrono = { workspace = true, features = ["serde"] }
regex = "1.10"
base64 = { workspace = true, features = ["alloc"] }
once_cell = { workspace = true, optional = true }
prometheus = { workspace = true, optional = true }
brrtrouter = { workspace = true, default-features = false, optional = true }
tokio = { workspace = true, features = ["sync"], optional = true }
blake3 = { workspace = true, optional = true }
redis = { workspace = true, optional = true }
futures = { workspace = true, optional = true }
arc-swap = { workspace = true, optional = true }

[features]
default = []
metrics = ["once_cell", "prometheus", "brrtrouter", "tokio"]

[dev-dependencies]
chrono = { version = "0.4", features = ["serde"] }
uuid = { workspace = true, features = ["v4", "serde"] }
