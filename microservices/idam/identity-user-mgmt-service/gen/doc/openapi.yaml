    User:
      type: object
      description: 'Complete user entity returned from user lifecycle operations.

        Contains identity attributes, account status, and migration metadata.

        '
      properties:
        user_id:
          type: string
          format: uuid
          description: Unique opaque identifier for this user (not PII)
        email:
          type: string
          format: email
          description: Primary email address (unique, not in URI)
        email_confirmed:
          type: boolean
          description: Whether the email address has been verified
        first_name:
          type: string
          nullable: true
          maxLength: 100
          description: User's first name
        last_name:
          type: string
          nullable: true
          maxLength: 100
          description: User's last name
        username:
          type: string
          nullable: true
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          description: Optional human-identifiable username (alphanumeric, underscore, hyphen)
        picture_url:
          type: string
          nullable: true
          format: uri
          description: Profile picture URL (e.g. from social login)
        properties:
          type: object
          additionalProperties: true
          description: 'Custom key-value metadata attached to the user.

            Platform admins can set arbitrary properties; SaaS customers limited to org-scoped keys.

            '
        locked:
          type: boolean
          description: 'If true, the user is locked and cannot authenticate.

            Locked users are typically flagged after repeated failed login attempts.

            '
        enabled:
          type: boolean
          description: 'If true, the user account is active and can authenticate.

            Disabled users are explicitly blocked (e.g. by admin action).

            '
        has_password:
          type: boolean
          description: 'Whether the user has a password set.

            '
      required:
      - user_id
      - email
      - first_name
      - last_name
      - username
      - enabled
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string
          enum:
          - invalid_request
          - invalid_credentials
          - invalid_grant
          - invalid_code
          - account_locked
          - mfa_required
          - email_not_confirmed
          - phone_not_verified
          - duplicate_email
          - weak_password
          - rate_limited
          - invalid_token
          - not_found
          - permission_denied
          - application_not_found
          - role_not_found
          - attribute_too_large
          description: Machine-readable error code
        error_description:
          type: string
          description: Human-readable error message
        hint:
          type: string
          description: Additional guidance for resolving the error
        retry_after:
          type: integer
          description: Retry-After seconds (only for rate_limited)
      example:
        error: invalid_request
        error_description: Bad request (validation error)
    LinkSocialAccountResponse:
      type: object
      required:
      - redirect_url
      - state
      properties:
        redirect_url:
          type: string
          format: uri
          description: URL to redirect the user's browser to the OAuth provider for linking
        state:
          type: string
          description: Unique state token for CSRF protection, must be included in the callback
      description: Response containing OAuth provider redirect URL and CSRF state token
      example: *id022
