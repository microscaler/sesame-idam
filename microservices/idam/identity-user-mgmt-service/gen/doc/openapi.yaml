      x-brrtrouter-impl: true
components:
  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Id:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Unique resource identifier (UUID)
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token (from Identity Service)
    ApiKeyHeader:
      type: apiKey
      in: header
      name: X-API-KEY
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
      required:
      - error
    CreateUserRequest:
      type: object
      description: 'Creates a new user. Idempotent: if an existing user with the same email

        is found, returns the existing user instead of creating a duplicate.

        Platform admins may omit `org_id` to create users without org membership.

        '
      required:
      - email
      properties:
        email:
          type: string
          format: email
          description: Primary email address (must be unique)
        email_confirmed:
          type: boolean
          default: false
          description: 'If true, the email is considered pre-verified (no confirmation email sent).

            Useful for platform-admin-created users or migrated accounts.

            '
        send_email_confirmation:
          type: boolean
          default: false
          description: 'If true, sends a verification email to the user''s address.

            Only meaningful when email_confirmed=false.

            '
        first_name:
          type: string
          maxLength: 100
          description: User's first name
        last_name:
          type: string
          maxLength: 100
          description: User's last name
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: ^[a-zA-Z0-9_-]+$
          description: Optional human-identifiable username
        picture_url:
          type: string
          format: uri
          description: Initial profile picture URL
        send_welcome_email:
          type: boolean
          default: false
          description: If true, sends a welcome email after user creation
        extra_properties:
          type: object
          additionalProperties: true
          description: Custom key-value metadata (arbitrary JSON)
        org_id:
          type: string
          format: uuid
          nullable: true
          description: 'For SaaS customers: required, must be their own organisation.

            For platform admins: optional — if omitted, creates a platform-level user.

            When present, the user is automatically added to this organisation.

            '
      example:
        email: newuser@example.com
        email_confirmed: false
        send_email_confirmation: true
        first_name: New
        last_name: User
        username: newuser
        send_welcome_email: true
        extra_properties:
          department: engineering
          role: developer
        org_id: 1189c444-8a2d-4c41-8b4b-ae43ce79a492
    EmployeeResponse:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        picture_url:
          type: string
          nullable: true
        org_id_to_org_info:
          type: object
          additionalProperties:
            type: object
            properties:
              org_id:
                type: string
                format: uuid
              org_name:
                type: string
              user_role:
                type: string
              user_permissions:
                type: array
                items:
                  type: string
      required:
      - user_id
      - email
      - first_name
      - last_name
      - username
    LinkSocialAccountRequest:
      type: object
      required:
      - provider
      properties:
        provider:
          type: string
          description: OAuth provider name
        scope:
          type: string
          description: Additional OAuth scopes
      example:
        provider: github
        scope: user:email
    MfaSetupRequest:
      type: object
      description: 'Request to set up TOTP MFA for a user.

        Requires the user''s current password for verification.

        '
      properties:
        password:
          type: string
          description: User's current password for verification
        name:
          type: string
          nullable: true
          maxLength: 50
          description: 'Optional label for the TOTP factor (e.g. "Google Authenticator", "Work phone").

            Shown in MFA management UI.

            '
      required:
      - password
      example:
        password: secret123
        name: Google Authenticator
    MfaSetupResponse:
      type: object
      description: 'Returns the TOTP provisioning URI that can be rendered as a QR code.

        The user must scan the QR code and enter the resulting code to complete setup.

        '
      properties:
        provisioning_uri:
          type: string
          description: 'TOTP provisioning URI in the format:

            `otpauth://totp/{issuer}:{user_id}?secret={secret}&issuer={issuer}`

            This can be rendered as a QR code for the user to scan.

            '
        secret:
          type: string
          description: 'Base32-encoded TOTP secret (also available in the provisioning URI).

            Shown as a fallback if the QR code cannot be scanned.

            '
        user_id:
          type: string
          format: uuid
          description: The user ID for whom MFA is being set up
      example:
        provisioning_uri: otpauth://totp/Sesame:test@example.com?secret=JBSWY3DPEHPK3PXP&issuer=Sesame
        secret: JBSWY3DPEHPK3PXP
        user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
      required:
      - provisioning_uri
      - secret
      - user_id
    MfaVerifyRequest:
      type: object
      description: 'Verifies an MFA code. Can be used for:

        1. Login step 2 (after MFA_REQUIRED response, includes session_id)

        2. MFA setup step 2 (after MFA setup generated QR code)

        '
      required:
      - code
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 10
          description: The MFA verification code (6-digit TOTP, 4-6 digit SMS, etc.)
        session_id:
          type: string
          nullable: true
          description: 'Session ID from MFA_REQUIRED login response. Required for step 2 of login.

            '
        challenge_id:
          type: string
          nullable: true
          description: 'WebAuthn challenge ID from MFA_REQUIRED response (for webauthn factor type).

            '
      example:
        code: '123456'
        session_id: sess_abc123
    MigrateUserRequest:
      type: object
      required:
      - email
      properties:
        email:
          type: string
          format: email
        email_confirmed:
          type: boolean
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        picture_url:
          type: string
        legacy_user_id:
          type: string
        extra_properties:
          type: object
          additionalProperties: true
        hash:
          type: string
        salt:
          type: string
        org_id:
          type: string
          format: uuid
          nullable: true
          description: 'For SaaS: required, their own org. For platform: optional.

            '
    MigratePasswordRequest:
      type: object
      required:
      - users
      properties:
        users:
          type: array
          items:
            type: object
            required:
            - email
            - hash
            - salt
            properties:
              email:
                type: string
                format: email
              hash:
                type: string
                description: bcrypt hash ($2a$14$...)
              salt:
                type: string
                description: Original salt if different from hash
    OAuthLogoutRequest:
      type: object
      properties:
        post_logout_redirect_uri:
          type: string
        id_token_hint:
          type: string
      example:
        post_logout_redirect_uri: https://admin.hauliage.com/dashboard
        id_token_hint: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
      required:
      - post_logout_redirect_uri
    OAuthTokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        token_type:
          type: string
        scope:
          type: string
      required:
      - access_token
      - token_type
    PhoneNumberRequest:
      type: object
      properties:
        phone_number:
          type: string
          pattern: ^\\\\+[1-9]\\\\d{1,14}$
          description: Phone number in E.164 format (e.g. +141****1234)
      required:
      - phone_number
    PhoneVerificationRequest:
      type: object
      properties:
        code:
          type: string
          minLength: 4
          maxLength: 10
          description: OTP code received via SMS
        phone_number:
          type: string
          pattern: ^\\\\+[1-9]\\\\d{1,14}$
          description: Phone number to verify (E.164 format)
      description: 'Verify a phone number via SMS OTP code.

        '
      example:
        phone_number: +141****1234
        code: '123456'
      required:
      - code
      - phone_number
    TokenListResponse:
      type: object
      properties:
        tokens:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              created_at:
                type: integer
                format: int64
              expires_at:
                type: integer
                format: int64
                nullable: true
              scopes:
                type: array
                items:
                  type: string
      required:
      - tokens
    TokenResponse:
      type: object
      required:
      - access_token
      - token_type
      - expires_in
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
