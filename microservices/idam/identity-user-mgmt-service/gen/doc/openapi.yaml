      x-brrtrouter-impl: true
  /users/migrate-password:
    post:
      tags:
      - UserMigration
      summary: Bulk migrate passwords (hash+salt)
      description: 'Imports passwords from another system. Password hash format: $2a$14$... (bcrypt).

        Platform admin only.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: migrate_user_passwords
      requestBody:
        required: true
        content:
          application/json:
