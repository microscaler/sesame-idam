openapi: 3.1.0
info:
  title: User Management Service
  version: 1.0.0
  description: 'Admin-heavy service for user lifecycle management.

    Handles user CRUD, account security (MFA, phone, email), password management,

    social account linking, and user migration from external systems.

    EXTREMELY LOW frequency with MEDIUM per-request cost.

    Write-heavy with no caching pressure.

    '
  contact:
    name: Platform / Security
servers:
- url: /api/v1/identity
  description: User Mgmt Service API
- url: /api/v1/identity-user-mgmt-service
  description: Identity User Mgmt Service API
tags:
- name: Users
  description: User lifecycle (CRUD, lookup, search, employee view)
- name: AccountSecurity
  description: Enable/disable, MFA, phone, email verification
- name: PasswordManagement
  description: Password set, clear, magic link, verification
- name: SocialAccounts
  description: Social account linking and token management
- name: UserMigration
  description: Import users from external auth systems
security:
- BearerAuth: []
- ApiKeyHeader: []
paths:
  /users:
    post:
      tags:
      - Users
      summary: Create user (idempotent by email)
      description: 'Creates a new user. Idempotent if email matches existing user — returns existing user.

        SaaS customers must provide their own `org_id`; platform admins may omit it.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: create_user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
            examples:
              default: &id001
                summary: Example for create_user
                value:
                  email: newuser@example.com
                  first_name: New
                  last_name: User
                  phone: '+1234567890'
                  username: newuser
                  send_welcome_email: true
            example: *id001
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                default: &id002
                  summary: Example for create_user 201
                  value:
                    user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                    email: newuser@example.com
                    email_verified: false
                    phone_verified: false
                    phone: '+1234567890'
                    username: newuser
                    first_name: New
                    last_name: User
                    avatar_url: null
                    role: user
                    is_active: true
                    created_at: '2024-01-15T10:30:00Z'
              example: *id002
        '200':
          description: User already exists (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: &id004
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: unauthorized
                error_description: Authentication required
        '500':
          description: Internal server error
          content: &id005
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: internal_error
                error_description: An unexpected error occurred
      parameters:
      - &id003
        name: X-Tenant-ID
        in: header
        required: true
        schema:
          type: string
          format: uuid
        description: Tenant identifier. Routes the request to the correct tenant context for user lookup and authentication.
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Create user account, not direct frontend'
      x-brrtrouter-impl: true
  /users/{user_id}:
    delete:
      tags:
      - Users
      summary: Delete user (irreversible)
      description: 'Irreversibly deletes a user account and all associated data.

        Platform admin only. Users in an org can only delete themselves.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: delete_user
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '204':
          description: User deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Delete user account, not direct frontend'
  /users/query:
    get:
      tags:
      - Users
      summary: Paginated query for users with filters
      description: 'Returns paginated list of users matching the given filters.

        Platform admins can search across all users; SaaS customers can only search their own org.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: query_users
      parameters:
      - *id003
      - name: page
        in: query
        schema:
          type: integer
          minimum: 1
          default: 1
      - name: limit
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
      - name: email_pattern
        in: query
        schema:
          type: string
        description: Email substring filter (case-insensitive)
      - name: email_confirmed
        in: query
        schema:
          type: boolean
          nullable: true
        description: Filter by email confirmation status
      - name: enabled
        in: query
        schema:
          type: boolean
          nullable: true
        description: Filter by enabled status
      - name: disabled
        in: query
        schema:
          type: boolean
          nullable: true
        description: Filter by disabled status
      - name: locked
        in: query
        schema:
          type: boolean
          nullable: true
        description: Filter by locked status
      - name: created_after
        in: query
        schema:
          type: string
          format: date-time
          nullable: true
        description: Filter by creation date (inclusive)
      - name: created_before
        in: query
        schema:
          type: string
          format: date-time
          nullable: true
        description: Filter by creation date (inclusive)
      - name: signup_flow
        in: query
        schema:
          type: string
          enum:
          - signup
          - invite
          - magiclink
          - password
          - social
          - saml
          nullable: true
        description: Filter by signup method
      responses:
        '200':
          description: Users found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserQueryResponse'
              examples:
                default: &id006
                  summary: Example response 200 for query_users
                  value:
                    users:
                    - user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                      email: alice@example.com
                      email_verified: true
                      phone_verified: false
                      phone: '+1234567890'
                      username: alice
                      first_name: Alice
                      last_name: Smith
                      avatar_url: null
                      role: user
                      is_active: true
                      created_at: '2024-01-01T00:00:00Z'
                    - user_id: 42d52c27-d392-55bf-0713-5b158f4cf44e
                      email: bob@example.com
                      email_verified: true
                      phone_verified: true
                      phone: '+1987654321'
                      username: bob
                      first_name: Bob
                      last_name: Jones
                      avatar_url: https://example.com/avatars/bob.png
                      role: admin
                      is_active: true
                      created_at: '2024-01-02T00:00:00Z'
                    total: 2
                    page: 1
                    limit: 20
              example: *id006
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Query/filter users, not direct frontend'
  /users/email:
    get:
      tags:
      - Users
      summary: Fetch user by email
      description: 'Returns the user associated with the given email. No PII in URI.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_user_by_email
      parameters:
      - *id003
      - name: email
        in: query
        required: true
        schema:
          type: string
          format: email
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                default: &id007
                  summary: Example response 200 for fetch_user_by_email
                  value:
                    user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                    email: alice@example.com
                    email_verified: true
                    phone_verified: false
                    phone: '+1234567890'
                    username: alice
                    first_name: Alice
                    last_name: Smith
                    avatar_url: https://example.com/avatars/alice.png
                    role: user
                    is_active: true
                    created_at: '2024-01-01T00:00:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
              example: *id007
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Lookup user by email, not direct frontend'
  /users/username:
    get:
      tags:
      - Users
      summary: Fetch user by username
      operationId: fetch_user_by_username
      parameters:
      - *id003
      - name: username
        in: query
        required: true
        schema:
          type: string
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                default: &id008
                  summary: Example response 200 for fetch_user_by_username
                  value:
                    user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                    email: alice@example.com
                    email_verified: true
                    phone_verified: false
                    phone: '+1234567890'
                    username: alice
                    first_name: Alice
                    last_name: Smith
                    avatar_url: https://example.com/avatars/alice.png
                    role: user
                    is_active: true
                    created_at: '2024-01-01T00:00:00Z'
                    updated_at: '2024-01-15T10:30:00Z'
              example: *id008
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      description: Requires `X-Tenant-ID` header for tenant resolution.
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Lookup user by username, not direct frontend'
  /users/{user_id}/employee:
    get:
      tags:
      - Users
      summary: Fetch user in employee mode
      description: 'Returns user info filtered to the caller''s organisation context only.

        Used for B2B directory lookup — omits orgs the user is not part of.

        Requires BearerAuth with org context.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: fetch_employee
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
              examples:
                default: &id009
                  summary: Example response 200 for fetch_employee
                  value:
                    user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                    employee_id: EMP-001
                    email: alice@example.com
                    first_name: Alice
                    last_name: Smith
                    department: Engineering
                    title: Senior Developer
              example: *id009
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Fetch user in employee context, not direct frontend'
  /users/{user_id}/disable:
    post:
      tags:
      - PasswordSecurity
      summary: Disable/block user
      description: 'Prevents user from logging in. Platform admin or SaaS with org context.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: disable_user
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          description: User disabled
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Disable/block user account, not direct frontend'
      x-brrtrouter-impl: true
  /users/{user_id}/enable:
    post:
      tags:
      - PasswordSecurity
      summary: Enable/unblock user
      description: 'Re-enables a previously disabled user.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: enable_user
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          description: User enabled
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Enable/unblock user account, not direct frontend'
      x-brrtrouter-impl: true
  /users/{user_id}/logout-all-sessions:
    post:
      tags:
      - Sessions
      summary: Logout all user sessions
      description: 'Invalidates all active sessions for this user. Platform admin or user themselves.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: logout_all_sessions
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '204':
          description: All sessions invalidated
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: frontend
      x-consumer-note: Direct browser call to logout all sessions for current user
      x-brrtrouter-impl: true
  /users/{user_id}/magiclink:
    post:
      tags:
      - AuthFlows
      summary: Send magic link for login
      description: 'Sends an email with a magic link for passwordless login.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: create_magic_link
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          description: Magic link sent
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Generate magic link for another user, not direct frontend'
      x-brrtrouter-impl: true
  /users/{user_id}/password:
    delete:
      tags:
      - PasswordSecurity
      summary: Clear password (convert to SSO-only)
      description: 'Removes the user''s password, converting them to SSO-only authentication.

        Useful when an organisation enforces SAML SSO and users should no longer use email/password.

        Platform admin only.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: clear_user_password
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '400':
          description: User has no password to clear
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '204':
          description: Password cleared successfully
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: admin-console
      x-consumer-note: 'Admin console only: Clear user password (force SSO), not direct frontend'
  /users/{user_id}/email/verify:
    post:
      tags:
      - PasswordSecurity
      summary: Verify user email
      operationId: verify_user_email
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Email verified
        '400':
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      description: Requires `X-Tenant-ID` header for tenant resolution.
      x-consumer: frontend
      x-consumer-note: Direct browser call to verify current user email
      x-brrtrouter-impl: true
  /users/{user_id}/resend-email-confirmation:
    post:
      tags:
      - PasswordSecurity
      summary: Resend email confirmation
      operationId: resend_email_confirmation
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          description: Email sent
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      description: Requires `X-Tenant-ID` header for tenant resolution.
      x-consumer: frontend
      x-consumer-note: Direct browser call to resend email verification
      x-brrtrouter-impl: true
  /users/{user_id}/mfa/disable:
    post:
      tags:
      - PasswordSecurity
      summary: Disable user 2FA
      description: 'Disables all 2FA methods for a user. Platform admin or user themselves.


        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: disable_user_mfa
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '400':
          description: Bad request — validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: validation_error
                message: Request validation failed
        '200':
          description: 2FA disabled
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Not found
        '401':
          description: Unauthorized — invalid, expired, or missing credentials
          content: *id004
        '500':
          description: Internal server error
          content: *id005
      x-consumer: frontend
      x-consumer-note: Direct browser call to disable MFA for current user
      x-brrtrouter-impl: true
  /users/{user_id}/mfa/setup:
    post:
      tags:
      - PasswordSecurity
      summary: Set up TOTP MFA
      description: 'Generates a TOTP secret QR code for the user to scan with an authenticator app.

        Requires the user''s current password for verification.

        Returns a provisioning URI that can be rendered as a QR code.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: setup_user_mfa_totp
      parameters:
      - *id003
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MfaSetupRequest'
            examples:
              default: &id010
                summary: Example request for setup_user_mfa_totp
                value:
                  password: SecureP@ss123!
            example: *id010
      responses:
        '200':
          description: TOTP secret generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MfaSetupResponse'
              examples:
                default: &id011
                  summary: Example response 200 for setup_user_mfa_totp
                  value:
                    mfa_required: true
                    secret: JBSWY3DPEHPK3PXP
                    qr_code: data:image/png;base64,example
                    backup_codes:
                    - '12345678'
                    - '87654321'
                    - '11111111'
                    - '22222222'
                    - '33333333'
              example: *id011
        '400':
          description: Invalid password or MFA already configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: invalid_request
                error_description: Bad request (validation error)
        '404':
          description: Not found
          content:
            application/json:
              schema:
