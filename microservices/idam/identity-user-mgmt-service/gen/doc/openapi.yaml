  /users/migrate:
    post:
      tags:
      - UserMigration
      summary: Migrate user from external auth system
      description: 'Imports a user from another authentication system. Includes hash+salt password import,

        extra properties, legacy user ID mapping. Platform admin only.



        Requires `X-Tenant-ID` header for tenant resolution.'
      operationId: migrate_user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MigrateUserRequest'
            examples:
              default: &id020
                summary: Example request for migrate_user
                value:
                  source_provider: legacy
                  source_user_id: LEG-001
            example: *id020
      responses:
        '201':
          description: User migrated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              examples:
                default: &id021
                  summary: Example response 201 for migrate_user
                  value:
                    user_id: 31c41c16-c281-44ae-9602-8a047e3bf33d
                    migrated: true
                    email: alice@example.com
                    migrated_at: '2024-01-15T10:30:00Z'
              example: *id021
        '400':
          description: Invalid request
          content:
