# BRRTRouter application configuration (YAML)
# Adjust values per environment and reload/restart the app.

security:
  jwks:
    BearerAuth:
      jwks_url: "http://identity-session-service:8105/.well-known/jwks.json"
      iss: "https://idam.example.com"
      aud: "myapp.com"
      leeway_secs: 60
      cache_ttl_secs: 300
  api_keys:
    ApiKeyHeader:
      key: "test123"

# JWT token TTL configuration (Story 3.3)
# All access tokens use 5-minute (300s) TTL after F-010 alignment.
# Environment variables override these values:
#   JWT_ACCESS_TTL_NORMAL, JWT_ACCESS_TTL_ELEVATED,
#   JWT_ACCESS_TTL_ADMIN, JWT_ACCESS_TTL_PLATFORM,
#   JWT_REFRESH_TTL_DAYS, JWT_ADMIN_REFRESH_TTL_DAYS
jwt:
  access_token:
    normal_ttl_secs: 300
    elevated_ttl_secs: 300
    admin_ttl_secs: 300
    platform_ttl_secs: 300
  refresh_token:
    normal_ttl_days: 30
    admin_ttl_days: 7

http:
  keep_alive: true
  timeout_secs: 5
  max_requests: 5000

# Browser / Swagger "Try it out": without a cors section, BRRTRouter still installs CORS
# middleware with an empty origin list and returns 403 for cross-origin Origin headers.
# Wildcard is dev-only (insecure for production); replace with explicit origins before prod.
cors:
  origins:
    - "*"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "Accept"
    - "X-API-Key"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_credentials: false
