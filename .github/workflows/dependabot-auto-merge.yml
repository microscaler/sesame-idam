# Enables GitHub auto-merge on Dependabot PRs so merges happen once required checks pass.
# Prereqs (repo Settings → General → Pull requests): "Allow auto-merge" enabled.
# Branch protection on `main` should require CI jobs you trust before merge.
name: Dependabot auto-merge

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Optional approval helps when branch rules require a review;
      # GITHUB_TOKEN can approve same-repo PRs.
      - name: Approve Dependabot PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Major semver bumps stay open for human review; patch/minor
      # (and non-semver bumps) queue auto-merge.
      - name: Enable auto-merge (squash)
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
