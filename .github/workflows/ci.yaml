name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  workspace-check:
    name: Check workspace
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check workspace resolves
        run: cargo check --workspace
        # Workspace has no crate members yet; this still validates Cargo.toml structure.
        # When microservices are added, this will build them.

  tooling-qa:
    name: Tooling QA (ruff, format-check, pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install just
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://just.systems/install.sh | bash -s -- --to /usr/local/bin
          just --version

      - name: Init tooling and run QA
        run: |
          just init
          just qa
        # Same guard rails as RERP: ruff (lint + format-check) + pytest.

  openapi-validate:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install npm deps (if any)
        run: npm ci || true

      - name: Validate OpenAPI (legacy spec)
        run: npx @redocly/openapi-cli lint ./specs/openapi.yaml || true
